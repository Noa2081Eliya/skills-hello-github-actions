name: Security Scan

on: [push, pull_request]

jobs:
  semgrep:
    name: SAST Scan with Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608
      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan --error --config auto
